<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <!-- 响应式视口标签 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML文件跳转导航</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft Yahei", sans-serif;
        }
        body {
            padding: 20px 15px;
            background-color: #f5f7fa;
        }
        h2 {
            color: #222;
            margin-bottom: 24px;
            text-align: center;
            font-size: 22px;
        }
        ul {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            list-style: none;
            max-width: 1100px;
            margin: 0 auto;
        }
        li a {
            display: block;
            padding: 12px;
            background: #fff;
            border: 1px solid #d0d7e3;
            border-radius: 6px;
            text-decoration: none;
            color: #2364b3;
            transition: 0.2s;
            font-size: 14px;
        }
        li a:hover {
            background: #e6f0fc;
            border-color: #2364b3;
        }

        /* 响应式媒体查询 */
        /* 平板：2列 */
        @media (max-width: 768px) {
            ul {
                grid-template-columns: repeat(2, 1fr);
            }
            h2 {
                font-size: 20px;
            }
        }
        /* 手机：1列 */
        @media (max-width: 480px) {
            ul {
                grid-template-columns: 1fr;
            }
            body {
                padding: 15px 10px;
            }
            li a {
                padding: 14px;
                font-size: 15px;
            }
        }
    </style>
</head>
<body>
    <h2>HTML案例文件跳转入口</h2>
    <ul id="fileBox"></ul>

    <script>
        // 全部15个HTML文件
        const fileNames = [
            "001简单的HTML文件.html",
            "002输出文本.html",
            "003输出文本.html",
            "004输出孔子的名言.html",
            "005HTML5的标题.html",
            "006文档标题.html",
            "007输出古诗.html",
            "008《span》标签的应用.html",
            "009编程词典简介.html",
            "010编程词典简介.html",
            "011明日科技教学视频.html",
            "012葡萄.html",
            "013水果.html",
            "014编程词典简介.html",
            "015友情链接.html"
        ];
        const box = document.getElementById('fileBox');
        fileNames.forEach(name => {
            const li = document.createElement('li');
            const a = document.createElement('a');
            a.href = name;
            a.innerText = name;
            li.appendChild(a);
            box.appendChild(li);
        })
    </script>
</body>
</html>
